<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة العمال</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #2d3148;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOP NAV */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
  .topbar span { font-size: 12px; color: var(--muted); }

  /* BOTTOM NAV */
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .bottomnav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 10px 4px 14px;
    font-size: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .bottomnav button.active { color: var(--accent); }
  .bottomnav button svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; padding: 16px; padding-bottom: 80px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .card-val { font-size: 28px; font-weight: 800; }

  /* STATS ROW */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .stat-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-card .val { font-size: 24px; font-weight: 800; }

  /* ALERT CARDS */
  .alert-card {
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
  }
  .alert-card.red { background: #2a1515; border: 1px solid #7f1d1d; }
  .alert-card.yellow { background: #2a2010; border: 1px solid #78350f; }
  .alert-card.green { background: #0f2a1a; border: 1px solid #14532d; }
  .alert-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .alert-card.red .alert-icon { background: #7f1d1d; }
  .alert-card.yellow .alert-icon { background: #78350f; }
  .alert-card.green .alert-icon { background: #14532d; }
  .alert-info .name { font-weight: 700; font-size: 14px; }
  .alert-info .desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* WORKER LIST */
  .worker-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .worker-card:hover { border-color: var(--accent); }
  .worker-top { display: flex; align-items: center; gap: 12px; }
  .worker-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; flex-shrink: 0;
  }
  .worker-name { font-weight: 700; font-size: 15px; }
  .worker-role { font-size: 12px; color: var(--muted); }
  .worker-badges { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .badge {
    font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600;
  }
  .badge.green { background: #14532d; color: #4ade80; }
  .badge.red { background: #7f1d1d; color: #f87171; }
  .badge.yellow { background: #78350f; color: #fbbf24; }
  .badge.blue { background: #1e3a5f; color: #60a5fa; }

  /* SECTION TITLE */
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 10px; margin-top: 6px;
  }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--card2); }

  /* BUTTONS */
  .btn {
    width: 100%; padding: 14px; border-radius: var(--radius);
    border: none; cursor: pointer; font-size: 15px; font-weight: 700;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--green); color: white; }
  .btn-danger { background: var(--red); color: white; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 16px; }

  /* DETAIL SECTIONS */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .detail-item { background: var(--card2); border-radius: 10px; padding: 12px; }
  .detail-item .dl { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .detail-item .dv { font-size: 14px; font-weight: 700; }

  /* SALARY ROW */
  .salary-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card2); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 8px;
  }
  .salary-row .month { font-size: 13px; }
  .salary-row .amount { font-size: 16px; font-weight: 800; color: var(--green); }
  .salary-row .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); margin-left: 8px;
  }
  .salary-row .status-dot.unpaid { background: var(--red); }

  /* SEARCH */
  .search-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .search-box input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 14px; flex: 1;
  }
  .search-box svg { color: var(--muted); flex-shrink: 0; }

  /* FAB */
  .fab {
    position: fixed; bottom: 76px; left: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none;
    color: white; font-size: 26px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(79,142,247,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 90;
  }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-accent { color: var(--accent); }

  /* progress bar */
  .progress-bar { background: var(--card2); border-radius: 20px; height: 6px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 20px; background: var(--accent); transition: width 0.5s; }
  .progress-fill.red { background: var(--red); }
  .progress-fill.yellow { background: var(--yellow); }
  .progress-fill.green { background: var(--green); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>👷 إدارة العمال</h1>
  <span id="today-date"></span>
</div>

<!-- PAGES -->

<!-- الرئيسية -->
<div class="page active" id="page-home">
  <div class="stats">
    <div class="stat-card">
      <div class="label">إجمالي العمال</div>
      <div class="val text-accent" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">إقامات منتهية</div>
      <div class="val text-red" id="stat-expired">0</div>
    </div>
    <div class="stat-card">
      <div class="label">تنتهي قريباً</div>
      <div class="val text-yellow" id="stat-soon">0</div>
    </div>
    <div class="stat-card">
      <div class="label">رواتب هذا الشهر</div>
      <div class="val text-green" id="stat-paid">0</div>
    </div>
  </div>

  <div class="section-title">⚠️ تنبيهات عاجلة</div>
  <div id="alerts-container">
    <div class="card" style="text-align:center; color: var(--muted); padding: 30px;">لا توجد تنبيهات حالياً ✅</div>
  </div>
</div>

<!-- العمال -->
<div class="page" id="page-workers">
  <div class="search-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
    <input type="text" placeholder="ابحث عن عامل..." id="search-input" oninput="filterWorkers()">
  </div>
  <div id="workers-list"></div>
</div>

<!-- الرواتب -->
<div class="page" id="page-salary">
  <div class="section-title">💰 رواتب شهر <span id="current-month"></span></div>
  <div id="salary-list"></div>
  <div class="divider"></div>
  <div class="card">
    <div class="card-title">إجمالي الرواتب المستحقة</div>
    <div class="card-val text-green" id="total-salary">0 د.إ</div>
  </div>
</div>

<!-- التقارير -->
<div class="page" id="page-reports">
  <div class="section-title">📊 ملخص عام</div>
  <div id="reports-content"></div>
</div>

<!-- FAB زر إضافة -->
<button class="fab" onclick="openAddWorker()" id="fab-btn">+</button>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="active" onclick="showPage('home', this)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    الرئيسية
  </button>
  <button onclick="showPage('workers', this)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    العمال
  </button>
  <button onclick="showPage('salary', this)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    الرواتب
  </button>
  <button onclick="showPage('reports', this)">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    تقارير
  </button>
</div>

<!-- MODAL: إضافة/تعديل عامل -->
<div class="modal-overlay" id="worker-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">➕ إضافة عامل جديد</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>الاسم الكامل *</label>
      <input type="text" id="f-name" placeholder="محمد أحمد">
    </div>
    <div class="form-group">
      <label>الجنسية</label>
      <select id="f-nationality">
        <option>هندي</option><option>باكستاني</option><option>بنغلاديشي</option>
        <option>فيليبيني</option><option>مصري</option><option>سوداني</option>
        <option>نيبالي</option><option>سريلانكي</option><option>إثيوبي</option><option>أخرى</option>
      </select>
    </div>
    <div class="form-group">
      <label>المهنة / الوظيفة</label>
      <input type="text" id="f-job" placeholder="عامل، سائق، حارس...">
    </div>
    <div class="form-group">
      <label>رقم الهاتف</label>
      <input type="tel" id="f-phone" placeholder="05XXXXXXXX">
    </div>
    <div class="form-group">
      <label>رقم الإقامة</label>
      <input type="text" id="f-iqama" placeholder="رقم الإقامة">
    </div>
    <div class="form-group">
      <label>تاريخ انتهاء الإقامة</label>
      <input type="date" id="f-iqama-exp">
    </div>
    <div class="form-group">
      <label>رقم الهوية / الجواز</label>
      <input type="text" id="f-id" placeholder="رقم الهوية أو الجواز">
    </div>
    <div class="form-group">
      <label>تاريخ انتهاء الهوية / الجواز</label>
      <input type="date" id="f-id-exp">
    </div>
    <div class="form-group">
      <label>شركة الضمان الصحي</label>
      <input type="text" id="f-insurance" placeholder="اسم شركة التأمين">
    </div>
    <div class="form-group">
      <label>تاريخ انتهاء الضمان</label>
      <input type="date" id="f-ins-exp">
    </div>
    <div class="form-group">
      <label>الراتب الشهري (درهم)</label>
      <input type="number" id="f-salary" placeholder="1500">
    </div>
    <div class="form-group">
      <label>تاريخ الانضمام</label>
      <input type="date" id="f-join">
    </div>
    <div style="display:flex; gap:10px; margin-top: 6px;">
      <button class="btn btn-primary" style="flex:2" onclick="saveWorker()">💾 حفظ</button>
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('worker-modal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- MODAL: تفاصيل عامل -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- MODAL: تسجيل راتب -->
<div class="modal-overlay" id="salary-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>💰 تسجيل راتب</h2>
    <input type="hidden" id="s-worker-id">
    <div class="form-group">
      <label>الشهر</label>
      <input type="month" id="s-month">
    </div>
    <div class="form-group">
      <label>المبلغ المدفوع (درهم)</label>
      <input type="number" id="s-amount" placeholder="1500">
    </div>
    <div class="form-group">
      <label>ملاحظة</label>
      <input type="text" id="s-note" placeholder="خصم، بدل، مكافأة...">
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-success" style="flex:2" onclick="saveSalary()">✅ تأكيد الدفع</button>
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('salary-modal')">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ============ DATA ============
let workers = JSON.parse(localStorage.getItem('workers') || '[]');
let salaries = JSON.parse(localStorage.getItem('salaries') || '[]');

function save() {
  localStorage.setItem('workers', JSON.stringify(workers));
  localStorage.setItem('salaries', JSON.stringify(salaries));
}

// ============ UTILS ============
const today = new Date();
document.getElementById('today-date').textContent = today.toLocaleDateString('ar-AE');
document.getElementById('current-month').textContent = today.toLocaleDateString('ar-AE', {month:'long', year:'numeric'});

function daysUntil(dateStr) {
  if (!dateStr) return 9999;
  const d = new Date(dateStr);
  return Math.ceil((d - today) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('ar-AE');
}

function getInitials(name) {
  return name ? name.trim()[0] : '?';
}

function getExpStatus(dateStr) {
  const d = daysUntil(dateStr);
  if (d < 0) return { cls: 'red', label: 'منتهية' };
  if (d <= 30) return { cls: 'yellow', label: `تنتهي بعد ${d} يوم` };
  return { cls: 'green', label: `صالحة (${d} يوم)` };
}

function currentMonthKey() {
  return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
}

function isSalaryPaid(workerId, monthKey) {
  return salaries.some(s => s.workerId === workerId && s.month === monthKey);
}

// ============ NAV ============
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bottomnav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab-btn').style.display = name === 'workers' ? 'flex' : 'none';
  if (name === 'home') renderHome();
  if (name === 'workers') renderWorkers();
  if (name === 'salary') renderSalary();
  if (name === 'reports') renderReports();
}

// Hide FAB on non-workers pages initially
document.getElementById('fab-btn').style.display = 'none';

// ============ HOME ============
function renderHome() {
  const mk = currentMonthKey();
  const expired = workers.filter(w => daysUntil(w.iqamaExp) < 0 || daysUntil(w.idExp) < 0 || daysUntil(w.insExp) < 0);
  const soon = workers.filter(w => {
    const days = Math.min(
      w.iqamaExp ? daysUntil(w.iqamaExp) : 9999,
      w.idExp ? daysUntil(w.idExp) : 9999,
      w.insExp ? daysUntil(w.insExp) : 9999
    );
    return days >= 0 && days <= 30;
  });
  const paid = workers.filter(w => isSalaryPaid(w.id, mk));

  document.getElementById('stat-total').textContent = workers.length;
  document.getElementById('stat-expired').textContent = expired.length;
  document.getElementById('stat-soon').textContent = soon.length;
  document.getElementById('stat-paid').textContent = paid.length + '/' + workers.length;

  let html = '';
  workers.forEach(w => {
    const checks = [
      { label: 'الإقامة', exp: w.iqamaExp },
      { label: 'الهوية', exp: w.idExp },
      { label: 'الضمان', exp: w.insExp },
    ];
    checks.forEach(c => {
      if (!c.exp) return;
      const d = daysUntil(c.exp);
      if (d < 0) {
        html += `<div class="alert-card red"><div class="alert-icon">⚠️</div><div class="alert-info"><div class="name">${w.name}</div><div class="desc">${c.label} منتهية منذ ${Math.abs(d)} يوم</div></div></div>`;
      } else if (d <= 30) {
        html += `<div class="alert-card yellow"><div class="alert-icon">🕐</div><div class="alert-info"><div class="name">${w.name}</div><div class="desc">${c.label} تنتهي بعد ${d} يوم</div></div></div>`;
      }
    });
    if (!isSalaryPaid(w.id, mk)) {
      html += `<div class="alert-card red"><div class="alert-icon">💸</div><div class="alert-info"><div class="name">${w.name}</div><div class="desc">راتب هذا الشهر لم يُصرف</div></div></div>`;
    }
  });

  document.getElementById('alerts-container').innerHTML = html || '<div class="card" style="text-align:center; color: var(--muted); padding: 30px;">لا توجد تنبيهات حالياً ✅</div>';
}

// ============ WORKERS ============
function renderWorkers(filter='') {
  const mk = currentMonthKey();
  const list = workers.filter(w => !filter || w.name.includes(filter) || (w.job||'').includes(filter));
  let html = '';
  if (!list.length) {
    html = '<div class="card" style="text-align:center; color: var(--muted); padding: 40px;">لا يوجد عمال<br><small>اضغط + لإضافة عامل</small></div>';
  }
  list.forEach(w => {
    const iqSt = getExpStatus(w.iqamaExp);
    const idSt = getExpStatus(w.idExp);
    const insSt = getExpStatus(w.insExp);
    const salPaid = isSalaryPaid(w.id, mk);
    html += `
    <div class="worker-card" onclick="openDetail('${w.id}')">
      <div class="worker-top">
        <div class="worker-avatar">${getInitials(w.name)}</div>
        <div>
          <div class="worker-name">${w.name}</div>
          <div class="worker-role">${w.job || '—'} · ${w.nationality || ''}</div>
        </div>
      </div>
      <div class="worker-badges">
        <span class="badge ${iqSt.cls}">🪪 إقامة: ${iqSt.label}</span>
        <span class="badge ${idSt.cls}">📄 هوية: ${idSt.label}</span>
        <span class="badge ${insSt.cls}">🏥 ضمان: ${insSt.label}</span>
        <span class="badge ${salPaid ? 'green' : 'red'}">${salPaid ? '✅ راتب مدفوع' : '❌ راتب معلق'}</span>
      </div>
    </div>`;
  });
  document.getElementById('workers-list').innerHTML = html;
}

function filterWorkers() {
  renderWorkers(document.getElementById('search-input').value.trim());
}

// ============ DETAIL ============
function openDetail(id) {
  const w = workers.find(x => x.id === id);
  if (!w) return;
  const mk = currentMonthKey();
  const workerSalaries = salaries.filter(s => s.workerId === id).sort((a,b) => b.month.localeCompare(a.month));

  let salHtml = workerSalaries.slice(0,6).map(s => `
    <div class="salary-row">
      <span class="month">${s.month}</span>
      <span class="amount">${s.amount} د.إ ${s.note ? '<small style="color:var(--muted)">· '+s.note+'</small>' : ''}</span>
      <div class="status-dot"></div>
    </div>`).join('') || '<p style="color:var(--muted); font-size:13px;">لا توجد سجلات رواتب</p>';

  document.getElementById('detail-content').innerHTML = `
    <div style="display:flex; align-items:center; gap:14px; margin-bottom:16px;">
      <div class="worker-avatar" style="width:56px;height:56px;font-size:22px;">${getInitials(w.name)}</div>
      <div>
        <div style="font-size:20px; font-weight:800;">${w.name}</div>
        <div style="color:var(--muted); font-size:13px;">${w.job||'—'} · ${w.nationality||''}</div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="dl">رقم الهاتف</div><div class="dv">${w.phone||'—'}</div></div>
      <div class="detail-item"><div class="dl">تاريخ الانضمام</div><div class="dv">${formatDate(w.join)}</div></div>
      <div class="detail-item"><div class="dl">رقم الإقامة</div><div class="dv">${w.iqama||'—'}</div></div>
      <div class="detail-item"><div class="dl">انتهاء الإقامة</div><div class="dv" style="color:var(--${getExpStatus(w.iqamaExp).cls === 'green' ? 'green' : getExpStatus(w.iqamaExp).cls === 'yellow' ? 'yellow' : 'red'})">${formatDate(w.iqamaExp)}</div></div>
      <div class="detail-item"><div class="dl">رقم الهوية</div><div class="dv">${w.idNum||'—'}</div></div>
      <div class="detail-item"><div class="dl">انتهاء الهوية</div><div class="dv" style="color:var(--${getExpStatus(w.idExp).cls === 'green' ? 'green' : getExpStatus(w.idExp).cls === 'yellow' ? 'yellow' : 'red'})">${formatDate(w.idExp)}</div></div>
      <div class="detail-item"><div class="dl">شركة التأمين</div><div class="dv">${w.insurance||'—'}</div></div>
      <div class="detail-item"><div class="dl">انتهاء الضمان</div><div class="dv" style="color:var(--${getExpStatus(w.insExp).cls === 'green' ? 'green' : getExpStatus(w.insExp).cls === 'yellow' ? 'yellow' : 'red'})">${formatDate(w.insExp)}</div></div>
    </div>
    <div class="card" style="margin-bottom:12px;">
      <div class="card-title">الراتب الشهري</div>
      <div class="card-val text-green">${w.salary||'—'} د.إ</div>
    </div>
    <div class="section-title">سجل الرواتب</div>
    ${salHtml}
    <div style="display:flex; gap:8px; margin-top:14px;">
      <button class="btn btn-success" style="flex:1" onclick="openSalary('${id}')">💰 صرف راتب</button>
      <button class="btn btn-primary" style="flex:1" onclick="editWorker('${id}')">✏️ تعديل</button>
    </div>
    <button class="btn btn-danger" style="margin-top:8px;" onclick="deleteWorker('${id}')">🗑️ حذف العامل</button>
    <button class="btn btn-outline" style="margin-top:8px;" onclick="closeModal('detail-modal')">إغلاق</button>
  `;
  openModal('detail-modal');
}

// ============ SALARY PAGE ============
function renderSalary() {
  const mk = currentMonthKey();
  let html = '';
  let total = 0;
  workers.forEach(w => {
    const paid = isSalaryPaid(w.id, mk);
    const sal = salaries.find(s => s.workerId === w.id && s.month === mk);
    const amount = sal ? sal.amount : (w.salary || 0);
    if (!paid) total += Number(w.salary || 0);
    html += `
    <div class="salary-row" onclick="openSalary('${w.id}')">
      <div>
        <div style="font-weight:700;">${w.name}</div>
        <div style="font-size:11px; color:var(--muted);">${w.job||'—'}</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="amount">${paid ? (sal.amount||w.salary||0) : (w.salary||0)} د.إ</span>
        <div class="status-dot ${paid ? '' : 'unpaid'}"></div>
      </div>
    </div>`;
  });
  document.getElementById('salary-list').innerHTML = html || '<p style="color:var(--muted); text-align:center; padding:20px;">لا يوجد عمال</p>';
  document.getElementById('total-salary').textContent = total.toLocaleString() + ' د.إ (متبقية)';
}

// ============ REPORTS ============
function renderReports() {
  const mk = currentMonthKey();
  const totalSal = workers.reduce((s, w) => s + Number(w.salary||0), 0);
  const paidCount = workers.filter(w => isSalaryPaid(w.id, mk)).length;
  const expiredIqama = workers.filter(w => daysUntil(w.iqamaExp) < 0).length;
  const expiredId = workers.filter(w => daysUntil(w.idExp) < 0).length;
  const expiredIns = workers.filter(w => daysUntil(w.insExp) < 0).length;

  const nationalities = {};
  workers.forEach(w => { nationalities[w.nationality||'أخرى'] = (nationalities[w.nationality||'أخرى']||0)+1; });
  const natHtml = Object.entries(nationalities).map(([k,v]) => `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span style="font-size:13px;">${k}</span>
      <div style="display:flex; align-items:center; gap:8px; flex:1; margin-right:12px;">
        <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${(v/workers.length*100)||0}%"></div></div>
        <span style="font-size:13px; font-weight:700; min-width:20px;">${v}</span>
      </div>
    </div>`).join('');

  document.getElementById('reports-content').innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="label">إجمالي الرواتب</div><div class="val text-green" style="font-size:18px;">${totalSal.toLocaleString()} د.إ</div></div>
      <div class="stat-card"><div class="label">الرواتب المدفوعة</div><div class="val text-accent">${paidCount}/${workers.length}</div></div>
      <div class="stat-card"><div class="label">إقامات منتهية</div><div class="val text-red">${expiredIqama}</div></div>
      <div class="stat-card"><div class="label">ضمان منتهي</div><div class="val text-red">${expiredIns}</div></div>
    </div>
    <div class="card">
      <div class="section-title" style="margin-bottom:12px;">توزيع الجنسيات</div>
      ${natHtml || '<p style="color:var(--muted); font-size:13px;">لا يوجد بيانات</p>'}
    </div>
    <div class="card">
      <div class="card-title">نسبة دفع الرواتب هذا الشهر</div>
      <div class="card-val text-accent">${workers.length ? Math.round(paidCount/workers.length*100) : 0}%</div>
      <div class="progress-bar"><div class="progress-fill green" style="width:${workers.length ? Math.round(paidCount/workers.length*100) : 0}%"></div></div>
    </div>
  `;
}

// ============ MODALS ============
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function openAddWorker() {
  document.getElementById('modal-title').textContent = '➕ إضافة عامل جديد';
  document.getElementById('edit-id').value = '';
  ['name','job','phone','iqama','id','insurance','salary'].forEach(f => document.getElementById('f-'+f).value = '');
  ['iqama-exp','id-exp','ins-exp','join'].forEach(f => document.getElementById('f-'+f).value = '');
  document.getElementById('f-join').value = new Date().toISOString().split('T')[0];
  openModal('worker-modal');
}

function editWorker(id) {
  const w = workers.find(x => x.id === id);
  if (!w) return;
  closeModal('detail-modal');
  document.getElementById('modal-title').textContent = '✏️ تعديل بيانات العامل';
  document.getElementById('edit-id').value = id;
  document.getElementById('f-name').value = w.name||'';
  document.getElementById('f-nationality').value = w.nationality||'هندي';
  document.getElementById('f-job').value = w.job||'';
  document.getElementById('f-phone').value = w.phone||'';
  document.getElementById('f-iqama').value = w.iqama||'';
  document.getElementById('f-iqama-exp').value = w.iqamaExp||'';
  document.getElementById('f-id').value = w.idNum||'';
  document.getElementById('f-id-exp').value = w.idExp||'';
  document.getElementById('f-insurance').value = w.insurance||'';
  document.getElementById('f-ins-exp').value = w.insExp||'';
  document.getElementById('f-salary').value = w.salary||'';
  document.getElementById('f-join').value = w.join||'';
  openModal('worker-modal');
}

function saveWorker() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('يرجى إدخال اسم العامل'); return; }
  const editId = document.getElementById('edit-id').value;
  const data = {
    id: editId || Date.now().toString(),
    name,
    nationality: document.getElementById('f-nationality').value,
    job: document.getElementById('f-job').value,
    phone: document.getElementById('f-phone').value,
    iqama: document.getElementById('f-iqama').value,
    iqamaExp: document.getElementById('f-iqama-exp').value,
    idNum: document.getElementById('f-id').value,
    idExp: document.getElementById('f-id-exp').value,
    insurance: document.getElementById('f-insurance').value,
    insExp: document.getElementById('f-ins-exp').value,
    salary: document.getElementById('f-salary').value,
    join: document.getElementById('f-join').value,
  };
  if (editId) {
    const i = workers.findIndex(x => x.id === editId);
    if (i >= 0) workers[i] = data;
  } else {
    workers.push(data);
  }
  save();
  closeModal('worker-modal');
  renderWorkers();
  renderHome();
}

function deleteWorker(id) {
  if (!confirm('هل أنت متأكد من حذف هذا العامل؟')) return;
  workers = workers.filter(w => w.id !== id);
  salaries = salaries.filter(s => s.workerId !== id);
  save();
  closeModal('detail-modal');
  renderWorkers();
  renderHome();
}

function openSalary(workerId) {
  const w = workers.find(x => x.id === workerId);
  closeModal('detail-modal');
  document.getElementById('s-worker-id').value = workerId;
  document.getElementById('s-month').value = currentMonthKey();
  document.getElementById('s-amount').value = w ? w.salary : '';
  document.getElementById('s-note').value = '';
  openModal('salary-modal');
}

function saveSalary() {
  const workerId = document.getElementById('s-worker-id').value;
  const month = document.getElementById('s-month').value;
  const amount = document.getElementById('s-amount').value;
  if (!month || !amount) { alert('يرجى إدخال الشهر والمبلغ'); return; }
  // Remove existing entry for same month
  salaries = salaries.filter(s => !(s.workerId === workerId && s.month === month));
  salaries.push({ workerId, month, amount: Number(amount), note: document.getElementById('s-note').value });
  save();
  closeModal('salary-modal');
  renderSalary();
  renderHome();
}

// ============ INIT ============
renderHome();
</script>
</body>
</html>
